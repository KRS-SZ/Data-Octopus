# STDF Wafermap Analyzer - Docker Compose Configuration
# For easy deployment with network share access

version: '3.8'

services:
  stdf-analyzer:
    build: .
    container_name: stdf-wafermap-analyzer
    ports:
      - "8501:8501"
    volumes:
      # Mount network shares - adjust paths as needed
      # Format: "host_path:container_path:ro" (ro = read-only)
      - //server/stdf_data:/data/stdf:ro
      - //server/test_results:/data/results:ro
      # Or for local testing on Windows:
      # - C:/Users/szenklarz/Desktop/VS_Folder/AM Data:/data/stdf:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Custom data paths (can be configured in app)
      - STDF_DATA_PATH=/data/stdf
      - RESULTS_PATH=/data/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

